<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Жеребьёвка техники</title>


    <link rel="stylesheet" href="../css/roulette.css">

</head>


<body>


<header class="top-panel">


    <h1>
        ЖЕРЕБЬЁВКА ТЕХНИКИ
    </h1>



    <div class="panel-right">


        <label class="repeat">


            <input 
            type="checkbox" 
            id="repeatMode">


            <span>
                Повторение
            </span>


        </label>




        <button id="battleButton">

            В БОЙ!

        </button>



    </div>


</header>





<main class="roulette-container">





<!-- ================= ТТ ================= -->


<section class="tank-column">


    <h2>
        ТТ
    </h2>



    <div class="roller-window">


        <div class="center-line"></div>



        <div 
        class="roller-track" 
        id="ttTrack">
        </div>



        <img 
        class="result-tank" 
        id="ttResult">



    </div>



    <div 
    class="tank-name" 
    id="ttName">

        ...

    </div>



</section>







<!-- ================= СТ ================= -->


<section class="tank-column">


    <h2>
        СТ
    </h2>



    <div class="roller-window">


        <div class="center-line"></div>



        <div 
        class="roller-track" 
        id="stTrack">
        </div>



        <img 
        class="result-tank" 
        id="stResult">



    </div>



    <div 
    class="tank-name" 
    id="stName">

        ...

    </div>



</section>








<!-- ================= ПТ ================= -->


<section class="tank-column">


    <h2>
        ПТ-САУ
    </h2>



    <div class="roller-window">


        <div class="center-line"></div>



        <div 
        class="roller-track" 
        id="ptTrack">
        </div>



        <img 
        class="result-tank" 
        id="ptResult">



    </div>



    <div 
    class="tank-name" 
    id="ptName">

        ...

    </div>



</section>





</main>





<script src="../js/roulette.js"></script>


</body>

</html>
