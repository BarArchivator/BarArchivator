<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Жеребьёвка техники</title>

    <link rel="stylesheet" href="../css/roulette.css">

</head>


<body>


<header class="top-panel">

    <h1>ЖЕРЕБЬЁВКА ТЕХНИКИ</h1>


    <div class="panel-right">

        <label class="repeat">

            <input type="checkbox" id="repeatMode">

            <span>Повторение</span>

        </label>


        <button id="battleButton">
            В БОЙ!
        </button>


    </div>

</header>



<main class="roulette-container">



    <!-- ТЯЖЕЛЫЕ ТАНКИ -->

    <section class="tank-column" id="tt">

        <h2>ТТ</h2>


        <div class="roller-window">

            <div class="center-line"></div>

            <div class="roller-track" id="ttTrack"></div>

        </div>


        <div class="tank-name" id="ttName">
            ...
        </div>


    </section>





    <!-- СРЕДНИЕ ТАНКИ -->

    <section class="tank-column" id="st">

        <h2>СТ</h2>


        <div class="roller-window">

            <div class="center-line"></div>

            <div class="roller-track" id="stTrack"></div>

        </div>


        <div class="tank-name" id="stName">
            ...
        </div>


    </section>





    <!-- ПТ-САУ -->

    <section class="tank-column" id="pt">

        <h2>ПТ-САУ</h2>


        <div class="roller-window">

            <div class="center-line"></div>

            <div class="roller-track" id="ptTrack"></div>

        </div>


        <div class="tank-name" id="ptName">
            ...
        </div>


    </section>



</main>



<script src="../js/roulette.js"></script>


</body>

</html>
