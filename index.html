<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Бар Архиватор</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{

background:#101010;

color:white;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

overflow:hidden;

}

.container{

text-align:center;

}

h1{

font-size:70px;

letter-spacing:5px;

margin-bottom:20px;

}

p{

font-size:24px;

opacity:.8;

}

button{

margin-top:40px;

padding:18px 45px;

font-size:22px;

background:#444;

border:none;

color:white;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#888;

transform:scale(1.05);

}

</style>

</head>

<body>

<div class="container">

<h1>БАР АРХИВАТОР</h1>

<p>Добро пожаловать</p>

<button>Войти</button>

</div>

</body>

</html>
